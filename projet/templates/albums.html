{% extends "base.html" %}
{% block styles %}
{{ super() }}
<link rel="stylesheet"
href="{{ url_for('static', filename='albums.css') }}"/>
{% endblock %}
{% block main %}
		<ul>
		{% for a in listeAlbum %}
		<a class="liste" href="{{ url_for('afficherInformationsAlbums', num_album = a.id) }}">
			<li>
				<p>{{ a.titre }}</p>
				<img width="80%" src="{{ url_for('static', filename='Images/Album/'+a.image)}}"alt="Image non trouvée">
			</li>
		</a>
		{% endfor %}
		</ul>
{% endblock %}
