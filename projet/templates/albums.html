{% extends "base.html" %}
{% block styles %}
{{ super() }}
<link rel="stylesheet"
href="{{ url_for('static', filename='albums.css') }}"/>
{% endblock %}
{% block main %}
		<ul>
		{% for a in listeAlbum %}
			<li>
				<p>{{ a.titre }}</p>
				<img width="80%" src="{{ url_for('static', filename='Images/Album/'+a.image)}}"alt="Image non trouvée">
			</li>
		{% endfor %}
		</ul>
{% endblock %}
