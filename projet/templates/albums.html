{% extends "base.html" %}
{% block styles %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='albums.css') }}"/>
{% endblock %}
{% block main %}
<a class="nav-link" href="{{url_for('ajouterAlbum')}}">
<input class="btn btn-default" type="submit" value="ajouter un album">
</a>
		<ul id="ul">
		{% for a in listeAlbum %}
		<a class="liste" href="{{ url_for('afficherInformationsAlbums', num_album = a.id) }}">
			<li id="li">
				<p>{{ a.titre }}</p>
				<img width="130em" src="{{ url_for('static', filename='Images/Album/'+a.image)}}"alt="Image non trouvée">
			</li>
		</a>
		{% endfor %}
	</ul>
	<section class="button-listing">
		{% if pageActuelle == "0" %}
		<form class="form-listing" method="POST" action="#">
	<button class="disableb" type="button" disabled>Page précédente</button>
	</form>
	{% else %}
	<form class="form-listing" method="POST" action="{{ url_for('afficherListeAlbum', numero_page=(pageActuelle | int)-1) }}">
		<button class="activeb" type="submit">Page précédente</button>
	</form>
	{% endif %}
	<form class="form-listing" method="POST" action="{{ url_for('afficherListeAlbum', numero_page=pageActuelle) }}">
	<button class="activeb" type="submit">Page actuelle : {{(pageActuelle | int)}}</button>
	</form>
	{% if (pageActuelle | int) == num_max %}
	<form class="form-listing" method="POST" action="#">
		<button class="disableb" type="button" disabled>Page Suivante</button>
	</form>
	{% else %}
	<form class="form-listing" method="POST" action="{{ url_for('afficherListeAlbum', numero_page=(pageActuelle | int)+1) }}">
	<button class="activeb" type="submit">Page Suivante</button>
	</form>
	{% endif %}
	</section>

		</ul>
{% endblock %}
