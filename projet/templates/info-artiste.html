{% extends "base.html" %}
{% block styles %}
{{ super() }}
<link rel="stylesheet"
href="{{ url_for('static', filename='info-artiste.css') }}"/>
{% endblock %}
{% block main %}
<section id="se">
  <h1> Information </h1>
  <h2> {{ nomA }} </h1>
  <img width="20%" src="{{ url_for('static', filename='Images/Artiste/'+nomA+'.jpg')}}"alt="Image non trouvée">
</section>
  <h4> Albums réalisés : </h4>
      {% for a in listeAlb %}
      <table>
        <td>Titre : {{ a.titre }} </td>
        <td> <img width="20%" src="{{ url_for('static', filename='Images/Album/'+a.image)}}"alt="Image non trouvée"> </td>
        <td> Genre : {{ a.genre }}</td>
        <td> Date de sortie : {{ a.dateSortie }}</td>
      </table>
      {% endfor %}
{% endblock %}
